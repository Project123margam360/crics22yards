  <!-- CRICS text -->
  <text x="50" y="35" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle" font-family="Arial, sans-serif">CRICS</text>
  
  <!-- 22YARDS text -->
  <text x="50" y="55" font-size="11" font-weight="bold" fill="#D7AF43" text-anchor="middle" font-family="Arial, sans-serif">22 YARDS</text>
  
